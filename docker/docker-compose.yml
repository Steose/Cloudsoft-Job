services:
  cloudsoft:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      FeatureFlags__UseMongoDb: "true"
      MongoDb__ConnectionString: mongodb://mongo:27017
      MongoDb__DatabaseName: Cloudsoft
      MongoDb__JobPostingsCollectionName: jobPostings
      MongoDb__EmployersCollectionName: employers
    depends_on:
      - mongo
    networks:
      - mongo_network

  mongo:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mongo_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - mongo_network

volumes:
  mongo-data:

networks:
  mongo_network:
    driver: bridge
